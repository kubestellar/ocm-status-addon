---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: status-controller
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: deployment
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: status-addon
    app.kubernetes.io/part-of: status-addon
    app.kubernetes.io/managed-by: kustomize
    app: status-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-controller
  template:
    metadata:
      labels:
        app: status-controller
    spec:
      securityContext:
        runAsNonRoot: true
      serviceAccountName: status-sa
      initContainers:
      - name: create-crd
        image: quay.io/kubestellar/kubectl:1.29.3
        command: ['sh', '-c']
        args:
        - |
          echo -n "Waiting for managedclusteraddons CRD"
          while [ "$(kubectl get crd clustermanagementaddons.addon.open-cluster-management.io 2> /dev/null)" == "" ] ; do
            echo -n "."
            sleep 1
          done
          echo -e "\033[0;32m\xE2\x9C\x94\033[0m"
          echo "Creating addon-status CR:"
          kubectl apply -f - <<EOF
          apiVersion: addon.open-cluster-management.io/v1alpha1
          kind: ClusterManagementAddOn
          metadata:
            name: addon-status
            namespace: open-cluster-management
          spec:
            addOnMeta:
              description: status addon provides full status on applied resources
              displayName: addon-status
            supportedConfigs:
            - group: addon.open-cluster-management.io
              resource: addondeploymentconfigs
          EOF
      containers:
      - name: status-controller
        image: controller
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 64Mi
        env:
        - name: STATUS_ADDDON_IMAGE_NAME
          value: STATUS_ADDDON_IMAGE_NAME_PLACEHOLDER
        args:
        - "controller"
